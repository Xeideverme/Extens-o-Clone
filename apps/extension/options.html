<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clone3D Snapshot Options</title>
    <link rel="stylesheet" href="/src/options/options.css" />
  </head>
  <body>
    <main class="page">
      <header>
        <h1>Clone3D Snapshot</h1>
        <p>Configuração inicial da extensão.</p>
      </header>
      <form id="settings-form">
        <label>
          Catbox upload endpoint
          <input id="catbox-upload-endpoint" name="catboxUploadEndpoint" type="url" value="https://catbox.moe/user/api.php" />
        </label>
        <label>
          Inline threshold KB
          <input id="inline-threshold" name="inlineThresholdKb" type="number" min="1" step="1" value="50" />
        </label>
        <label>
          Download concurrency
          <input id="download-concurrency" name="downloadConcurrency" type="number" min="1" step="1" value="4" />
        </label>
        <label>
          Download timeout ms
          <input id="download-timeout" name="downloadTimeoutMs" type="number" min="1000" step="1000" value="30000" />
        </label>
        <label>
          Max download attempts
          <input id="max-download-attempts" name="maxDownloadAttempts" type="number" min="1" step="1" value="3" />
        </label>
        <label>
          Upload concurrency
          <input id="upload-concurrency" name="uploadConcurrency" type="number" min="1" step="1" value="24" />
        </label>
        <label>
          Upload timeout ms
          <input id="upload-timeout" name="uploadTimeoutMs" type="number" min="1000" step="1000" value="60000" />
        </label>
        <label>
          Max upload attempts
          <input id="max-upload-attempts" name="maxUploadAttempts" type="number" min="1" step="1" value="3" />
        </label>
        <label class="checkbox-row">
          <input id="generate-html-save-as" name="generateHtmlSaveAs" type="checkbox" checked />
          Save as ao gerar app.html
        </label>
        <label class="checkbox-row">
          <input id="include-rewrite-report" name="includeRewriteReportInHtml" type="checkbox" checked />
          Incluir relatorio no app.html
        </label>
        <label class="checkbox-row">
          <input id="runtime-resolver-enabled" name="runtimeResolverEnabled" type="checkbox" checked />
          Incluir runtime resolver
        </label>
        <button type="submit">Salvar</button>
      </form>
      <p id="save-status" aria-live="polite"></p>
    </main>
    <script type="module" src="/src/options/options.ts"></script>
  </body>
</html>
