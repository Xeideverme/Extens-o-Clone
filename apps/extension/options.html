<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clone3D Snapshot Options</title>
    <link rel="stylesheet" href="/src/options/options.css" />
  </head>
  <body>
    <main class="page">
      <header>
        <h1>Clone3D Snapshot</h1>
        <p>Configuração inicial da extensão.</p>
      </header>
      <form id="settings-form">
        <label>
          Catbox upload endpoint
          <input id="catbox-upload-endpoint" name="catboxUploadEndpoint" type="url" value="https://catbox.moe/user/api.php" />
        </label>
        <label>
          Inline threshold KB
          <input id="inline-threshold" name="inlineThresholdKb" type="number" min="1" step="1" value="50" />
        </label>
        <label>
          Download concurrency
          <input id="download-concurrency" name="downloadConcurrency" type="number" min="1" step="1" value="4" />
        </label>
        <label>
          Download timeout ms
          <input id="download-timeout" name="downloadTimeoutMs" type="number" min="1000" step="1000" value="30000" />
        </label>
        <label>
          Max download attempts
          <input id="max-download-attempts" name="maxDownloadAttempts" type="number" min="1" step="1" value="3" />
        </label>
        <label>
          Upload concurrency
          <input id="upload-concurrency" name="uploadConcurrency" type="number" min="1" max="4" step="1" value="3" />
        </label>
        <label>
          Upload timeout ms
          <input id="upload-timeout" name="uploadTimeoutMs" type="number" min="1000" step="1000" value="60000" />
        </label>
        <label>
          Max upload attempts
          <input id="max-upload-attempts" name="maxUploadAttempts" type="number" min="1" step="1" value="3" />
        </label>
        <label class="checkbox-row">
          <input id="generate-html-save-as" name="generateHtmlSaveAs" type="checkbox" checked />
          Save as ao gerar app.html
        </label>
        <label class="checkbox-row">
          <input id="include-rewrite-report" name="includeRewriteReportInHtml" type="checkbox" checked />
          Incluir relatorio no app.html
        </label>
        <label class="checkbox-row">
          <input id="runtime-resolver-enabled" name="runtimeResolverEnabled" type="checkbox" checked />
          Incluir runtime resolver
        </label>
        <fieldset>
          <legend>API Replay</legend>
          <label class="checkbox-row">
            <input id="api-replay-enabled" name="apiReplayEnabled" type="checkbox" checked />
            Enable API replay
          </label>
          <label>
            Max API body size KB
            <input id="api-replay-max-body" name="apiReplayMaxBodyKb" type="number" min="64" max="5120" step="64" value="2048" />
          </label>
          <label class="checkbox-row">
            <input id="api-replay-same-origin" name="apiReplayCaptureSameOriginOnly" type="checkbox" />
            Capture same-origin only
          </label>
          <label class="checkbox-row">
            <input id="api-replay-text-plain" name="apiReplayAllowTextPlain" type="checkbox" checked />
            Allow text/plain responses
          </label>
        </fieldset>
        <fieldset>
          <legend>Pipeline</legend>
          <label class="checkbox-row">
            <input id="pipeline-continue-partial" name="pipelineContinueOnPartialFailure" type="checkbox" checked />
            Continue pipeline on partial failure
          </label>
          <label class="checkbox-row">
            <input id="pipeline-auto-prepare-3d" name="pipelineAutoPrepare3d" type="checkbox" checked />
            Auto prepare 3D during pipeline
          </label>
          <label class="checkbox-row">
            <input id="pipeline-auto-generate-html" name="pipelineAutoGenerateHtml" type="checkbox" checked />
            Auto generate app.html during pipeline
          </label>
          <label>
            Pipeline poll interval ms
            <input id="pipeline-poll-interval" name="pipelinePollIntervalMs" type="number" min="500" max="5000" step="100" value="1000" />
          </label>
        </fieldset>
        <fieldset>
          <legend>Asset serving / CORS</legend>
          <p>Catbox direto pode falhar para JS modules, dynamic imports, WASM, GLTF e fetch. Use CORS proxy ou fallback inline/blob.</p>
          <label>
            Asset serving mode
            <select id="asset-serving-mode" name="assetServingMode">
              <option value="auto">auto</option>
              <option value="catbox-direct">catbox-direct</option>
              <option value="catbox-cors-proxy">catbox-cors-proxy</option>
              <option value="inline-blob">inline-blob</option>
            </select>
          </label>
          <label class="checkbox-row">
            <input id="cors-proxy-enabled" name="corsProxyEnabled" type="checkbox" />
            Enable CORS proxy
          </label>
          <label>
            CORS proxy endpoint
            <input id="cors-proxy-endpoint" name="corsProxyEndpoint" type="url" placeholder="https://seu-worker.workers.dev" />
          </label>
          <label>
            Module serving strategy
            <select id="module-serving-strategy" name="moduleServingStrategy">
              <option value="auto">auto</option>
              <option value="proxy">proxy</option>
              <option value="inline-source">inline-source</option>
              <option value="inline-blob">inline-blob</option>
            </select>
          </label>
          <label>
            Max inline/blob asset KB
            <input id="self-contained-max-inline" name="selfContainedMaxInlineAssetKb" type="number" min="64" max="51200" step="64" value="2048" />
          </label>
          <label class="checkbox-row">
            <input id="allow-critical-missing" name="allowGenerateWithCriticalMissingAssets" type="checkbox" />
            Permitir app.html com assets criticos faltando
          </label>
        </fieldset>
        <button type="submit">Salvar</button>
      </form>
      <p id="save-status" aria-live="polite"></p>
    </main>
    <script type="module" src="/src/options/options.ts"></script>
  </body>
</html>
