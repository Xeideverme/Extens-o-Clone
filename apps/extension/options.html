<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clone3D Snapshot Options</title>
    <link rel="stylesheet" href="/src/options/options.css" />
  </head>
  <body>
    <main class="page">
      <header>
        <h1>Clone3D Snapshot</h1>
        <p>Configuração inicial da extensão.</p>
      </header>
      <form id="settings-form">
        <label>
          Worker endpoint
          <input id="worker-endpoint" name="workerEndpoint" type="url" placeholder="https://worker.example.com" />
        </label>
        <label>
          Public assets base URL
          <input id="public-base-url" name="publicBaseUrl" type="url" placeholder="https://assets.example.com" />
        </label>
        <label>
          Inline threshold KB
          <input id="inline-threshold" name="inlineThresholdKb" type="number" min="1" step="1" value="50" />
        </label>
        <label>
          Download concurrency
          <input id="download-concurrency" name="downloadConcurrency" type="number" min="1" step="1" value="4" />
        </label>
        <label>
          Download timeout ms
          <input id="download-timeout" name="downloadTimeoutMs" type="number" min="1000" step="1000" value="30000" />
        </label>
        <label>
          Max download attempts
          <input id="max-download-attempts" name="maxDownloadAttempts" type="number" min="1" step="1" value="3" />
        </label>
        <button type="submit">Salvar</button>
      </form>
      <p id="save-status" aria-live="polite"></p>
    </main>
    <script type="module" src="/src/options/options.ts"></script>
  </body>
</html>
